name: Builder
on:
  push:
    branches:
      - master
  schedule:
    - cron: "0/30 * * * *"
  workflow_dispatch:

# Permissions required to deploy to GitHub Pages directly from Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize Pages deployments so runs never race each other.
# Pages deployments must not be cancelled mid-flight (that can leave the
# github-pages environment locked), so queue runs instead of cancelling.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build the website with the latest contents
        uses: ./action-build
        with:
          API_KEY: ${{ secrets.API_KEY }}
          DATA_URL: ${{ secrets.DATA_URL }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # The built site lives in docs/ inside the runner; it is uploaded and
      # deployed directly to Pages, so nothing is committed back to the repo.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
